<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login Test</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:40px;">
<h2>Login Debug</h2>
<div id="log" style="white-space:pre-wrap;"></div>
<script>
const log = document.getElementById('log');
function L(m){ log.textContent += m + '\n'; }

async function test(){
  L('Fetching users.json...');
  try {
    const r = await fetch('/admin/users.json?t='+Date.now());
    L('Status: ' + r.status);
    const text = await r.text();
    L('Raw response: ' + text);
    const users = JSON.parse(text);
    L('Users loaded: ' + users.length);
    users.forEach(function(u){
      L('  User: "' + u.username + '" Pass: "' + u.password + '" Role: ' + u.role);
    });
  } catch(e) {
    L('ERROR: ' + e.message);
  }
}
test();
</script>
</body>
</html>
