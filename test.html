<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px;">
<h2>Live Debug</h2>
<pre id="log"></pre>
<script>
const log=document.getElementById('log');
function L(m){log.textContent+=m+'\n';}

async function run(){
  L('1. Testing db-ip.com...');
  try{
    const r=await fetch('https://api.db-ip.com/v2/free/self');
    L('   Status: '+r.status);
    const d=await r.json();
    L('   IP: '+d.ipAddress);
    L('   Country: '+d.countryName+' ('+d.countryCode+')');
    L('   City: '+d.city);
    L('   ✅ db-ip works');
  }catch(e){L('   ❌ '+e.message);}

  L('');
  L('2. Testing getElementById...');
  L('   ipDisplay exists: '+ !!document.getElementById('ipDisplay'));
  L('   metaISP exists: '+ !!document.getElementById('metaISP'));
  L('   metaCountry exists: '+ !!document.getElementById('metaCountry'));
  L('   metaCity exists: '+ !!document.getElementById('metaCity'));

  L('');
  L('3. Testing countryFlag...');
  try{
    function countryFlag(code){
      if(!code||code.length!==2) return '';
      return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));
    }
    L('   HT flag: ['+countryFlag('HT')+']');
    L('   US flag: ['+countryFlag('US')+']');
    L('   ✅ flags work');
  }catch(e){L('   ❌ '+e.message);}
  
  L('');
  L('4. Now running ACTUAL fetchIP from yesmyip.com/es/ ...');
  try{
    const r = await fetch('https://yesmyip.com/es/');
    const html = await r.text();
    const hasDbIp = html.includes('db-ip.com');
    const hasIpinfo = html.includes('ipinfo.io');
    const hasIpwho = html.includes('ipwho.is');
    const hasIpapi = html.includes('ipapi.co');
    L('   ES page APIs: db-ip='+hasDbIp+' ipinfo='+hasIpinfo+' ipwho='+hasIpwho+' ipapi='+hasIpapi);
    
    // Check if there's a syntax error in the script
    const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
    if(scriptMatch){
      L('   Script length: '+scriptMatch[1].length+' chars');
      try{
        new Function(scriptMatch[1]);
        L('   ✅ Script syntax valid');
      }catch(e){
        L('   ❌ SYNTAX ERROR: '+e.message);
        L('   This is why ES/FR fail!');
      }
    }
  }catch(e){L('   ❌ '+e.message);}
  
  L('');
  L('Done!');
}
run();
</script>
</body>
</html>
